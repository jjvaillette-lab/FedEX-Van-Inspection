  <path d="M13 34 C 20 34, 20 22, 27 20" fill="none" stroke="#F5A623" stroke-width="2.6"
        stroke-linecap="round" stroke-dasharray="0.5 5.5"/>
  <circle cx="13" cy="34" r="3.4" fill="#F5A623"/>
  <!-- destination pin -->
  <path d="M31 11 a7 7 0 0 1 7 7 c0 5.2 -7 11.5 -7 11.5 s-7 -6.3 -7 -11.5 a7 7 0 0 1 7 -7 z" fill="#F5A623"/>
  <circle cx="31" cy="18" r="2.7" fill="#122A4A"/>
</svg>
